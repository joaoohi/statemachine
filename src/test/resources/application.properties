
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Dialeto do Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cria as tabelas automaticamente e limpa no final do teste
spring.jpa.hibernate.ddl-auto=create-drop

# Opcional: mostra as queries SQL no console (muito ·til para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilita Flyway/Liquibase caso vocĻ use no ambiente principal
spring.flyway.enabled=false
spring.liquibase.enabled=false